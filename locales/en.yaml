name: English
help: |
  🦢 To add an alert, send the command /alert
  
  The price is always set in the format PP.KK (where PP are integers and KK are decimals).
  
  <b>Basic commands</b>
  
  /alert, /a - Price level achievement monitor
  /shift, /s - Price speed monitoring
  /list - List of all monitors
  /list btc - List of all monitors for ticker btc
  /price YNDX — I'll tell you the current price by ticker
  /remove, /r — Bulk removal of notifications
  /r BTCUSDT — Bulk removal by ticker
  /help - Goose will send this message again
  /admin - Admin mode for managing chats and connecting your own bot to Goose
  
  <b>Add monitoring with one command</b>
  
  /alert YNDX 73.80 - Add an alert in one command (YNDX - ticker, 73.80 - price at which the notification will come)
  /alert YNDX 73.80 90.3 34.2 - You can set several prices at once
  /alert YNDX +100 -12 - You can set an alert regarding the current price (-12 is 12 units below the current price)
  /alert YNDX +10% -25% - You can set an alert regarding the current price by a certain percentage
  
  <b>Specify currency for cryptocurrency</b>
  
  If you want to monitor the price in a specific currency, then indicate it in tandem with the crypto ticker. By default, <b>USD</b> or <b>USDT</b> will be used.
  
  /alert DOGE 1.5 - Add an alert for the price <b>1.5$</b>
  /alert DOGERUB 70 - Add price alert <b>70₽</b>
  /alert DOGEEUR 1.1 - Add an alert for the price <b>1.1€</b>
  
  <b>Monitoring currencies</b>
  
  Just enter any pair and most likely it will be in the bot.
  Example: /alert EURUSD 1.2
  
  <b>The /list command</b>
  
  In the command menu, you can view, edit and delete any monitoring.
  
  <b>Admin mode /admin</b>
  
  Add the bot to your chat with administrator rights to see it in admin mode. When you switch to it, you'll be able to configure notifications for each of your groups.
  
  <b>Quote sources</b>
  
  Securities - <a href="https://www.tinkoff.ru/invest/stocks/">Tinkoff</a>
  Cryptocurrencies - Almost all major exchanges and aggregators
  
  Support chat 🦢: @GooseInvestAlertChat
  Order bot improvements or buy it: @ashugaev 🧙‍♂️

