adminHelp: |
  <b>Commands</b>
  
  Some features are not yet available for admin mode (but will be soon)
  
  /shift, /s - Price speed monitoring
  /alert, /a - Price level achievement monitor
  /mytoken - Link/edit your bot to access Goose functionality
  /admin - Exit admin mode
  
  <b>Permissions</b>
  
  For a channel, admin rights with message sending permission are sufficient
  
  For a chat, admin is not required. It's enough to have message sending permission.
  
  <b>If chat/channel is not visible in the bot</b>
  
  You can try triggering any of the events the bot listens to
  - Send a new message
  - Change bot permissions
  - Remove and add the bot again
  - Run /admin command again
  
  If this doesn't help - contact Goose support chat: @GooseInvestAlertChat 🦢️️

