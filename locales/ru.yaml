  /admin - выход из режима админа

adminMode_on: |
  🧑‍💻 <b>Режим админа</b> включен
  
  Если есть вопросы, заходи в /help

adminMode_activeChatChanged: |
  🔄 Перешел к управлению: <b>${title}</b>

admin_removedChat: |
  🗑 Удален ${channel ? 'канал' : 'чат'} <b>${title}</b>

adminMode_off: |
  👋 <b>Режим админа</b> выключен

adminHelp: |
  <b>Команды</b>
  
  Часть ф-ция пока что не доступна для режима админа (но скоро будет)
  
  /shift, /s - Мониторинг скорости цены
  /alert, /a - Мониторинт достижения ценового уровня
  /mytoken - Привязать/редактировать своего бота для доступа к функционалу Гуся
  /admin - Выйти из режима админа
  
  <b>Доступы</b>
  
  Для канала достаточно прав админа с доступом к отправке сообщенийю
  
  Для чата админ не обязателен. Достаточно того, что у него будет право на отправку сообщений.
  
  <b>Если чат/канал не видно в боте</b>
  
  Можно попробовать стригерить любое из событий, которые слушает бот
  - Отправить новое сообщение
  - Изменить права бота
  - Удалить и снова добавить бота
  - Повторно выполни команду /admin
  
  Если это не помогает - обращайся в чат поддержки Гуся: @GooseInvestAlertChat 🦢️️

admin_helloChat: |
  👋 Всем привет! Я бот, который мониторит акции и криптовалюты.
  
  1️⃣ Доступ к настройкам уведомлений есть у <b>всех админов</b>. Для этого нужно перейти в режим админа командой /admin.
  2️⃣ Весь список моих функций можно посмотреть по команде /help
  3️⃣ Все команды работают только в личных сообщениях. Сообщения отправленный в чат я <b>не обрабатываю</b>.

admin_newChat: |
  🙌 Добавлен новый ${channel ? 'канал' : 'чат'} <b>${title}</b>
  
  Перейди в <b>режим админа</b> командой /admin, что бы настроить уведомления для него

mytoken_ask: |
  🥷 Пришли токен бота полученный в @BotFather
  
