pay: |
  👋 Раз ты увидел это сообщение, то видимо ты добрался до лимитов, которые установлены в боте для бесплатного использования. Это значит, что ты уже не просто начинающий трейдер, а серьезный игрок, который хочет получать максимум от бота 🚀
  
  🤖 Гусь исправно помогает зарабатывать тысячам пользователей, позволяя не пропускать выгодные сделки уже больше 2 лет, но Гусю тоже иногда нужна поддержка

  🏆 После оплаты ты получишь:
    - Неограниченное количество алертов для ценовых уровней
    - Неограниченное количество отслеживаний скорости цены
    - Больше бирж на выбор (⏳ скоро)
    - Мониторинг объемов (⏳ скоро)
    - Мониторинг скорости цены на меленьких таймфреймах (⏳ скоро)
    - Конструктор индивидуальных отчетов о рытке (⏳ скоро)
    - Получение отчетов несколько раз в день и за произвольный период (⏳ скоро)
  
  Автоматических списаний нет, по этому можешь оплатить на больший срок, либо взять сразу пожизненную подписку
  
  Оплата пока что только в криптовалюте, что бы оплатить картой <a href="https://t.me/ashugaev">напишите мне в личку</a> (только пожизненная подписка)

